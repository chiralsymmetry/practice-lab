name: Build and Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build and test
        run: tools/test.sh

      - name: Package release archive
        run: |
          cd dist
          zip -r ../practice-lab-dist.zip .

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: practice-lab-dist
          path: practice-lab-dist.zip

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: practice-lab-dist
          path: .

      - name: Choose release tag
        id: release_tag
        run: |
          git fetch --tags --force
          latest="$(git tag --list 'r[0-9][0-9][0-9][0-9]' --sort=-v:refname | head -n 1)"
          if [ -z "$latest" ]; then
            next=1
          else
            next=$((10#${latest#r} + 1))
          fi
          tag="$(printf 'r%04d' "$next")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          gh release create "$TAG" practice-lab-dist.zip \
            --title "$TAG" \
            --notes "Generated standalone Practice Lab HTML files from $GITHUB_SHA."
